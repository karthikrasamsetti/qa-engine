<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — QA Engine Fixture</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 360px; margin: 60px auto; padding: 0 16px; }
    h1 { font-size: 20px; }
    label { display: block; margin: 12px 0 4px; font-size: 14px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 16px; cursor: pointer; }
    .error { color: #b00020; font-size: 14px; margin-top: 12px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1 id="login-title">Sign in</h1>
  <form id="login-form" onsubmit="return false;">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required />

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required />

    <button type="submit" id="submit">Sign in</button>
    <a id="forgot-password" href="#">Forgot password?</a>
  </form>
  <div id="login-error" class="error hidden">Invalid email or password.</div>

  <script>
    document.getElementById("submit").addEventListener("click", function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      // Accept any non-empty credentials, then redirect to the dashboard page.
      if (email.trim() !== "" && password.trim() !== "") {
        window.location.href = "dashboard.html";
      } else {
        document.getElementById("login-error").classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
